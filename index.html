<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영향력 파워 진단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --card: #1a1a26;
  --border: #2a2a40;
  --accent1: #c89b5f;
  --accent2: #7b68ee;
  --text: #e8e4da;
  --muted: #888;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.35;
}
.ambient { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; opacity: 0.1; }
.amb1 { background: var(--accent2); top: -200px; left: -100px; }
.amb2 { background: var(--accent1); bottom: -200px; right: -100px; }

.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

/* INTRO */
#intro {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px 20px;
}
.crown { font-size: 60px; margin-bottom: 20px; display: block; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.intro-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(30px,6vw,54px); font-weight: 700; line-height: 1.2; letter-spacing:-1px; margin-bottom:16px;
  background: linear-gradient(135deg, var(--accent1), #fff 50%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.intro-sub { font-size:15px; color:var(--muted); max-width:480px; line-height:1.9; margin-bottom:44px; font-weight:300; }
.badges { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:560px; margin-bottom:48px; }
.badge { padding:6px 14px; border-radius:100px; font-size:12px; font-weight:500; border:1px solid; letter-spacing:.5px; }
.btn-start {
  background: linear-gradient(135deg, var(--accent1), #e8b870);
  color:#1a1200; border:none; padding:18px 56px; border-radius:100px;
  font-size:16px; font-weight:700; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  letter-spacing:1px; transition:all .3s;
  box-shadow:0 0 40px rgba(200,155,95,.3);
}
.btn-start:hover { transform:translateY(-3px); box-shadow:0 10px 50px rgba(200,155,95,.5); }

/* QUIZ */
#quiz { min-height:100vh; padding:24px 20px 80px; max-width:680px; margin:0 auto; }
.prog-wrap { position:sticky; top:0; background:var(--bg); padding:16px 0 20px; z-index:10; }
.prog-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
.prog-track { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent1)); border-radius:4px; transition:width .5s ease; }
.q-card {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:32px 28px; margin-top:8px; animation:slideIn .3s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.q-cat { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; display:inline-flex; align-items:center; gap:8px; }
.q-cat::before { content:''; width:20px; height:2px; border-radius:2px; background:currentColor; display:block; }
.q-text { font-family:'Noto Serif KR',serif; font-size:18px; line-height:1.75; color:var(--text); margin-bottom:28px; }
.scale-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:12px; }
.scale-opts { display:flex; gap:8px; }
.sca-btn {
  flex:1; aspect-ratio:1; border-radius:12px; border:1.5px solid var(--border); background:var(--surface);
  color:var(--muted); font-size:14px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all .2s;
  display:flex; align-items:center; justify-content:center; max-width:64px;
}
.sca-btn:hover { border-color:var(--accent2); color:var(--text); background:rgba(123,104,238,.1); transform:translateY(-2px); }
.sca-btn.sel { transform:translateY(-2px); box-shadow:0 4px 20px rgba(200,155,95,.2); }
.q-nav { display:flex; justify-content:space-between; align-items:center; margin-top:24px; gap:12px; }
.btn-prev {
  padding:12px 28px; border-radius:100px; border:1.5px solid var(--border);
  background:transparent; color:var(--text); font-size:14px; font-weight:500;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s;
}
.btn-prev:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-prev:disabled { opacity:.3; cursor:default; }
.btn-next {
  background:linear-gradient(135deg,var(--accent2),#a098f0); color:#fff; border:none;
  padding:13px 36px; border-radius:100px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s;
  box-shadow:0 4px 20px rgba(123,104,238,.3);
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(123,104,238,.5); }
.btn-next:disabled { opacity:.4; cursor:default; transform:none; box-shadow:none; }

/* RESULT */
#result { min-height:100vh; padding:40px 20px 80px; max-width:760px; margin:0 auto; }
.res-header { text-align:center; margin-bottom:48px; }
.res-icon { font-size:52px; margin-bottom:16px; }
.res-title {
  font-family:'Noto Serif KR',serif;
  font-size:clamp(22px,5vw,38px); font-weight:700; margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.res-date { font-size:13px; color:var(--muted); }

.chart-wrap { display:flex; justify-content:center; margin-bottom:44px; }
canvas#radarChart { max-width:380px; max-height:380px; }

.power-cards { display:flex; flex-direction:column; gap:10px; margin-bottom:44px; }
.p-card {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:20px 24px; display:flex; align-items:center; gap:18px;
  transition:all .3s; animation:fadeUp .4s ease both;
}
.p-card:hover { transform:translateX(4px); }
.p-card.top { border-color:var(--accent1); background:rgba(200,155,95,.05); }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.p-rank { font-size:22px; font-weight:700; color:var(--muted); min-width:32px; text-align:center; font-family:'Noto Serif KR',serif; }
.p-card.top .p-rank { color:var(--accent1); }
.p-ico { font-size:28px; min-width:38px; text-align:center; }
.p-info { flex:1; }
.p-name { font-size:15px; font-weight:700; margin-bottom:3px; }
.p-name-en { font-size:10px; color:var(--muted); letter-spacing:1px; margin-bottom:8px; }
.bar-track { height:6px; background:var(--border); border-radius:6px; overflow:hidden; }
.bar-fill { height:100%; border-radius:6px; transition:width 1s ease .3s; }
.p-score { font-size:22px; font-weight:700; min-width:52px; text-align:right; font-family:'Noto Serif KR',serif; }

.section-label {
  font-size:11px; font-weight:700; letter-spacing:2.5px; color:var(--muted);
  text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:10px;
}
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* Profile */
.profile-card {
  background:linear-gradient(135deg,rgba(123,104,238,.12),rgba(200,155,95,.08));
  border:1px solid rgba(123,104,238,.3); border-radius:20px;
  padding:32px 28px; margin-bottom:32px;
}
.profile-badge {
  display:inline-block; padding:4px 14px; border-radius:100px;
  font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px;
}
.profile-title { font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; margin-bottom:12px; }
.profile-desc { font-size:14px; line-height:1.9; color:var(--text); font-weight:300; }

/* Two col */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:32px; }
@media(max-width:520px){.two-col{grid-template-columns:1fr;}}
.col-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; }
.col-title { font-size:13px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.col-card ul { list-style:none; }
.col-card ul li { font-size:13px; line-height:1.7; color:var(--muted); padding:6px 0; border-bottom:1px solid var(--border); font-weight:300; }
.col-card ul li:last-child { border-bottom:none; }
.col-card ul li::before { content:'› '; font-weight:700; }

/* Accordion */
.detail-section { margin-bottom:32px; }
.detail-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden; }
.detail-header { padding:18px 22px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:background .2s; }
.detail-header:hover { background:rgba(255,255,255,.02); }
.detail-left { display:flex; align-items:center; gap:14px; flex:1; }
.detail-icon { font-size:22px; }
.detail-name { font-size:14px; font-weight:700; }
.detail-name-en { font-size:10px; color:var(--muted); letter-spacing:1px; }
.score-badge { padding:4px 12px; border-radius:100px; font-size:13px; font-weight:700; margin-left:auto; margin-right:12px; }
.detail-arrow { font-size:16px; color:var(--muted); transition:transform .3s; display:inline-block; }
.detail-arrow.open { transform:rotate(90deg); }
.detail-body { padding:0 22px 22px; display:none; }
.detail-body.open { display:block; }
.interp-text { font-size:13px; line-height:1.9; color:var(--text); font-weight:300; margin-bottom:14px; }
.tips-box { background:rgba(255,255,255,.03); border-radius:10px; padding:14px 18px; }
.tips-title { font-size:11px; font-weight:700; letter-spacing:1px; margin-bottom:10px; color:var(--accent1); }
.tips-box ul { list-style:none; }
.tips-box ul li { font-size:12px; color:var(--muted); padding:4px 0; font-weight:300; }
.tips-box ul li::before { content:'✦ '; color:var(--accent1); font-size:10px; }

/* Dev plan */
.dev-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; margin-bottom:32px; }
.dev-title { font-size:16px; font-weight:700; margin-bottom:8px; }
.dev-desc { font-size:13px; color:var(--muted); line-height:1.8; font-weight:300; margin-bottom:20px; }
.dev-steps { display:flex; flex-direction:column; gap:12px; }
.dev-step { display:flex; gap:14px; align-items:flex-start; }
.dev-num { min-width:28px; height:28px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--accent1); margin-top:2px; flex-shrink:0; }
.dev-text { font-size:13px; color:var(--text); line-height:1.75; font-weight:300; }

/* Actions */
.action-row { display:flex; gap:12px; margin-bottom:40px; flex-wrap:wrap; }
.btn-pdf {
  flex:1; min-width:160px; padding:16px; border-radius:14px;
  background:linear-gradient(135deg,var(--accent1),#e8b870); color:#1a1200;
  border:none; font-size:15px; font-weight:700; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all .2s; text-align:center;
  box-shadow:0 4px 20px rgba(200,155,95,.3);
}
.btn-pdf:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(200,155,95,.5); }
.btn-retry {
  flex:1; min-width:160px; padding:16px; border-radius:14px;
  background:var(--card); border:1.5px solid var(--border);
  color:var(--text); font-size:15px; font-weight:500; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all .2s; text-align:center;
}
.btn-retry:hover { border-color:var(--accent2); color:var(--accent2); }

/* PRINT */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* ── 배경 & 기본 텍스트 ── */
  body { background:#fff !important; color:#111 !important; font-size:13px !important; }
  body::before, .ambient, .action-row, .prog-wrap { display:none !important; }
  #intro, #quiz { display:none !important; }
  #result { display:block !important; padding:20px !important; max-width:100% !important; }

  /* ── 제목 ── */
  .res-header { margin-bottom:20px !important; }
  .res-icon { font-size:32px !important; }
  .res-title { font-size:24px !important; color:#1a1060 !important; -webkit-text-fill-color:#1a1060 !important; background:none !important; }
  .res-date { color:#333 !important; }

  /* ── 섹션 구분선 ── */
  .section-label { color:#1a1060 !important; font-weight:700 !important; font-size:10px !important; }
  .section-label::after { background:#999 !important; }

  /* ── 파워 순위 카드 ── */
  .power-cards { gap:6px !important; margin-bottom:24px !important; }
  .p-card { background:#f4f4f4 !important; border:1.5px solid #ccc !important; border-radius:10px !important; padding:12px 16px !important; gap:12px !important; }
  .p-card.top { background:#fffbf0 !important; border-color:#c89b5f !important; }
  .p-rank { color:#555 !important; font-size:16px !important; }
  .p-card.top .p-rank { color:#8a6820 !important; }
  .p-name { color:#111 !important; font-size:13px !important; font-weight:700 !important; }
  .p-name-en { color:#555 !important; }
  .bar-track { background:#ddd !important; height:8px !important; }
  .p-score { color:#111 !important; font-size:18px !important; }
  .p-score span { color:#555 !important; }

  /* ── 프로파일 카드 ── */
  .profile-card { background:#f0eeff !important; border:2px solid #7b68ee !important; border-radius:12px !important; padding:20px !important; margin-bottom:20px !important; }
  .profile-badge { background:#e8e4ff !important; color:#3020a0 !important; border:1px solid #9080cc !important; font-size:10px !important; }
  .profile-title { color:#1a1060 !important; font-size:16px !important; -webkit-text-fill-color:#1a1060 !important; }
  .profile-desc { color:#222 !important; line-height:1.8 !important; }

  /* ── 강점/개발 2열 카드 ── */
  .two-col { gap:10px !important; margin-bottom:20px !important; }
  .col-card { background:#f9f9f9 !important; border:1.5px solid #bbb !important; border-radius:10px !important; padding:14px !important; }
  .col-title { color:#111 !important; font-size:12px !important; }
  .col-card ul li { color:#222 !important; font-size:12px !important; border-bottom-color:#ddd !important; padding:4px 0 !important; }
  .col-card ul li::before { color:#333 !important; }

  /* ── 파워별 상세 해석 아코디언 ── */
  .detail-section { margin-bottom:20px !important; }
  .detail-card { background:#f9f9f9 !important; border:1.5px solid #bbb !important; border-radius:10px !important; margin-bottom:8px !important; }
  .detail-body { display:block !important; padding:0 16px 16px !important; }
  .detail-header { padding:12px 16px !important; background:#f0f0f0 !important; border-bottom:1px solid #ccc !important; }
  .detail-icon { font-size:18px !important; }
  .detail-name { color:#111 !important; font-size:13px !important; font-weight:700 !important; }
  .detail-name-en { color:#555 !important; font-size:10px !important; }
  .score-badge { font-size:11px !important; font-weight:700 !important; border:1.5px solid #999 !important; color:#111 !important; }
  .detail-arrow { display:none !important; }
  .interp-text { color:#1a1a1a !important; font-size:12px !important; line-height:1.8 !important; margin-bottom:10px !important; }
  .tips-box { background:#eeeeee !important; border-radius:8px !important; padding:10px 14px !important; }
  .tips-title { color:#1a1060 !important; font-size:10px !important; font-weight:700 !important; }
  .tips-box ul li { color:#222 !important; font-size:11px !important; }
  .tips-box ul li::before { color:#8a6820 !important; }

  /* ── 개발 로드맵 ── */
  .dev-card { background:#f9f9f9 !important; border:1.5px solid #bbb !important; border-radius:10px !important; padding:16px !important; margin-bottom:20px !important; }
  .dev-title { color:#111 !important; font-size:14px !important; font-weight:700 !important; }
  .dev-desc { color:#333 !important; font-size:12px !important; }
  .dev-steps { gap:8px !important; }
  .dev-num { background:#e0e0e0 !important; color:#8a6820 !important; border:1px solid #bbb !important; }
  .dev-text { color:#1a1a1a !important; font-size:12px !important; }

  /* ── 차트 ── */
  .chart-wrap { break-inside:avoid; margin-bottom:24px !important; }
  canvas#radarChart { max-width:240px !important; max-height:240px !important; }

  /* ── 페이지 분리 ── */
  .detail-card, .p-card, .col-card, .dev-card, .profile-card { break-inside:avoid; page-break-inside:avoid; }
  .detail-header { cursor:default; }
}
</style>
</head>
<body>
<div class="ambient amb1"></div>
<div class="ambient amb2"></div>

<!-- INTRO -->
<div id="intro" class="screen active">
  <span class="crown">👑</span>
  <h1 class="intro-title">영향력 파워<br>진단 테스트</h1>
  <p class="intro-sub">리더로서 당신이 어떤 파워를 기반으로 타인에게 영향을 미치는지 알아보세요.<br>진단 후 상세 해석 리포트 및 PDF 저장을 제공합니다.</p>
  <div class="badges">
    <span class="badge" style="color:#e05c6a;border-color:rgba(224,92,106,.4)">⚡ 강제적</span>
    <span class="badge" style="color:#4ecdc4;border-color:rgba(78,205,196,.4)">🔗 관계적</span>
    <span class="badge" style="color:#7b68ee;border-color:rgba(123,104,238,.4)">🎓 전문적</span>
    <span class="badge" style="color:#ffd93d;border-color:rgba(255,217,61,.4)">📡 정보적</span>
    <span class="badge" style="color:#c89b5f;border-color:rgba(200,155,95,.4)">⚖️ 합법적</span>
    <span class="badge" style="color:#ff9f7f;border-color:rgba(255,159,127,.4)">✨ 준거적</span>
    <span class="badge" style="color:#a8e6cf;border-color:rgba(168,230,207,.4)">🎁 보상적</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">진단 시작하기 →</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="prog-wrap">
    <div class="prog-meta">
      <span id="q-counter">1 / 28</span>
      <span id="q-cat-label"></span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="q-card" id="q-card">
    <div class="q-cat" id="q-cat"></div>
    <p class="q-text" id="q-text"></p>
    <div class="scale-label"><span>전혀 그렇지 않다</span><span>매우 그렇다</span></div>
    <div class="scale-opts" id="scale-opts"></div>
    <div class="q-nav">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 이전</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()">다음 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="res-header">
    <div class="res-icon">📊</div>
    <h2 class="res-title">영향력 파워 진단 리포트</h2>
    <p class="res-date" id="res-date"></p>
  </div>

  <div class="chart-wrap">
    <canvas id="radarChart" width="380" height="380"></canvas>
  </div>

  <div class="section-label">파워 강도 순위</div>
  <div class="power-cards" id="power-cards"></div>

  <div class="section-label">리더십 파워 프로파일</div>
  <div class="profile-card" id="profile-card"></div>

  <div class="section-label">강점 & 개발 포인트</div>
  <div class="two-col" id="str-caut"></div>

  {power:'legitimate',text:'내 직위에서 비롯된 공식적 권한이 팀원들에게 인정된다.'},
  {power:'referent',text:'사람들은 나를 역할 모델로 삼고 싶어 한다.'},
  {power:'referent',text:'구성원들은 나와 함께 일하는 것에 자부심을 느낀다.'},
  {power:'referent',text:'나의 개인적 특성과 인품이 사람들의 존경을 받는다.'},
  {power:'referent',text:'사람들은 내가 옳다고 생각하기 때문에 자발적으로 나를 따른다.'},
  {power:'reward',text:'나는 성과를 낸 사람에게 인정과 보상을 줄 수 있다.'},
  {power:'reward',text:'구성원들은 내가 좋은 성과에 보상을 제공한다는 것을 알고 있다.'},
  {power:'reward',text:'나는 물질적 또는 정신적 보상을 통해 사람들의 동기를 유발한다.'},
  {power:'reward',text:'성과에 따른 보상 제공이 나의 영향력을 높인다.'},
];

let answers = new Array(QUESTIONS.length).fill(null);
let currentQ = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function startQuiz() {
  answers = new Array(QUESTIONS.length).fill(null);
  currentQ = 0;
  showScreen('quiz');
  renderQ();
}
function restart() { showScreen('intro'); }

function renderQ() {
  const q = QUESTIONS[currentQ];
  const pw = POWERS.find(p=>p.id===q.power);
  const tot = QUESTIONS.length;
  document.getElementById('q-counter').textContent = `${currentQ+1} / ${tot}`;
  document.getElementById('q-cat-label').textContent = pw.name;
  document.getElementById('prog-fill').style.width = `${((currentQ+1)/tot)*100}%`;
  const cat = document.getElementById('q-cat');
  cat.textContent = `${pw.icon} ${pw.name}`;
  cat.style.color = pw.color;
  document.getElementById('q-text').textContent = q.text;
  const opts = document.getElementById('scale-opts');
  opts.innerHTML = '';
  for(let v=1;v<=5;v++){
    const b = document.createElement('button');
    b.className = 'sca-btn'+(answers[currentQ]===v?' sel':'');
    b.textContent = v;
    if(answers[currentQ]===v){ b.style.borderColor=pw.color; b.style.color=pw.color; b.style.background=pw.color+'22'; }
    b.onclick = ()=>selectAns(v,pw.color);
    opts.appendChild(b);
  }
  document.getElementById('btn-prev').disabled = currentQ===0;
  document.getElementById('btn-next').textContent = currentQ===tot-1 ? '결과 보기 ✓' : '다음 →';
  document.getElementById('btn-next').disabled = answers[currentQ]===null;
}
function selectAns(val,color) {
  answers[currentQ] = val;
  document.querySelectorAll('.sca-btn').forEach((b,i)=>{
    const v=i+1; b.className='sca-btn'+(v===val?' sel':'');
    b.style.borderColor=v===val?color:''; b.style.color=v===val?color:''; b.style.background=v===val?color+'22':'';
  });
  document.getElementById('btn-next').disabled = false;
}
function nextQ() {
  if(answers[currentQ]===null) return;
  if(currentQ===QUESTIONS.length-1){ showResult(); return; }
  currentQ++; animQ();
}
function prevQ() { if(currentQ===0) return; currentQ--; animQ(); }
function animQ() {
  const c=document.getElementById('q-card'); c.style.animation='none'; void c.offsetWidth; c.style.animation=''; renderQ();
}

function calcScores() {
  const s={}; POWERS.forEach(p=>s[p.id]=0);
  QUESTIONS.forEach((q,i)=>{ if(answers[i]!==null) s[q.power]+=answers[i]; });
  return s;
}
function tier(score){ return score>=16?'high':score>=10?'mid':'low'; }

function getProfile(ranked) {
  const ids = [ranked[0].id, ranked[1].id];
  const has = id=>ids.includes(id);
  if(has('referent')&&has('expert')) return {badge:'🌟 비전형 전문가 리더',color:'#7b68ee',title:'신뢰와 전문성으로 이끄는 리더',desc:'당신은 깊은 전문성과 진정성 있는 인품을 겸비한 리더입니다. 사람들이 자발적으로 따르며, 어려운 상황에서도 당신의 판단을 믿습니다. 이 조합은 장기적으로 가장 지속 가능하고 강력한 리더십 유형입니다. 변화를 이끌고 조직 문화를 형성하는 데 탁월한 영향력을 발휘합니다.'};
  if(has('connection')&&has('information')) return {badge:'🔄 네트워크형 정보 허브 리더',color:'#4ecdc4',title:'연결과 정보로 세상을 움직이는 리더',desc:'당신은 광범위한 인맥과 핵심 정보력을 결합해 조직의 중심 허브 역할을 합니다. 복잡한 환경에서 자원을 연결하고 조율하는 데 탁월한 능력을 발휘하며, 전략적 판단력으로 조직에 가치를 제공합니다.'};
  if(has('legitimate')&&has('reward')) return {badge:'🏛️ 제도형 성과 리더',color:'#c89b5f',title:'공식 권위와 보상으로 성과를 이끄는 리더',desc:'당신은 조직의 공식적 시스템을 효과적으로 활용하는 리더입니다. 명확한 권한 구조와 성과-보상 연계를 통해 팀의 목표 달성을 이끌며, 조직 내 공정성과 질서를 중시합니다.'};
  if(has('coercive')&&has('legitimate')) return {badge:'⚔️ 규율형 권위 리더',color:'#e05c6a',title:'명확한 기준과 권위로 조직을 이끄는 리더',desc:'당신은 명확한 규칙과 공식적 권위를 기반으로 조직을 운영합니다. 기준이 분명하고 일관성이 있어 위기 상황이나 변화 관리 시에 강점을 발휘합니다. 자율적 문화를 함께 육성하면 더욱 강력한 리더십이 됩니다.'};
  if(has('referent')&&has('reward')) return {badge:'💫 감성형 동기부여 리더',color:'#ff9f7f',title:'인정과 존경으로 마음을 움직이는 리더',desc:'당신은 진정한 인정과 보상, 개인적 매력으로 사람들을 동기부여하는 리더입니다. 구성원들은 당신과 함께 일하는 것에 보람을 느끼며, 이것이 팀 에너지의 원천이 됩니다.'};
  if(has('expert')&&has('information')) return {badge:'🔬 지식형 전략 리더',color:'#ffd93d',title:'지식과 정보로 앞서가는 리더',desc:'당신은 깊은 전문 지식과 핵심 정보력을 결합해 탁월한 의사결정을 내리는 리더입니다. 복잡한 문제를 분석하고 해결하는 능력이 뛰어나며, 전략적 사고의 강자입니다.'};
  const defaults = {
    coercive:{badge:'⚡ 규율형 리더',color:'#e05c6a',title:'명확한 기준으로 이끄는 리더',desc:'조직의 규칙과 기준을 명확하게 운영하며, 결과와 책임에 집중하는 리더입니다.'},
    connection:{badge:'🔗 네트워크형 리더',color:'#4ecdc4',title:'관계로 세상을 움직이는 리더',desc:'폭넓은 인맥을 통해 자원과 기회를 효과적으로 동원하는 리더입니다.'},
    expert:{badge:'🎓 전문가형 리더',color:'#7b68ee',title:'전문성으로 신뢰를 얻는 리더',desc:'깊은 지식과 기술이 가장 강력한 영향력의 원천입니다. 사람들이 자연스럽게 당신의 판단을 따릅니다.'},
    information:{badge:'📡 정보형 리더',color:'#ffd93d',title:'정보로 흐름을 만드는 리더',desc:'핵심 정보를 수집하고 전략적으로 활용하는 능력이 탁월합니다. 의사결정의 중심에서 조직을 이끕니다.'},
    legitimate:{badge:'⚖️ 권위형 리더',color:'#c89b5f',title:'공식 권한을 활용하는 리더',desc:'직위와 역할에서 오는 공식적 권위를 효과적으로 활용해 조직을 안정적으로 운영합니다.'},
    referent:{badge:'✨ 카리스마형 리더',color:'#ff9f7f',title:'존재 자체가 영향력인 리더',desc:'사람들이 자발적으로 따르고 닮고 싶어하는 진정성 있는 리더입니다. 인품이 가장 강력한 무기입니다.'},
    reward:{badge:'🎁 동기부여형 리더',color:'#a8e6cf',title:'보상으로 성과를 이끄는 리더',desc:'적절한 보상과 인정을 통해 팀의 동기를 효과적으로 이끌어내는 리더입니다.'},
  };
  return defaults[ranked[0].id];
}

function showResult() {
  showScreen('result');
  const now=new Date();
  document.getElementById('res-date').textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 진단`;
  const scores=calcScores();
  const maxScore=20;
  const ranked=POWERS.map(p=>({...p,score:scores[p.id],pct:Math.round((scores[p.id]/maxScore)*100)})).sort((a,b)=>b.score-a.score);

  // Rank cards
  const cardsEl=document.getElementById('power-cards');
  cardsEl.innerHTML='';
  ranked.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='p-card'+(i===0?' top':'');
    d.style.animationDelay=`${i*.07}s`;
    d.innerHTML=`
      <div class="p-rank">${i+1}</div>
      <div class="p-ico">${p.icon}</div>
      <div class="p-info">
        <div class="p-name" style="color:${p.color}">${p.name}</div>
        <div class="p-name-en">${p.nameEn}</div>
        <div class="bar-track"><div class="bar-fill" style="width:0%;background:${p.color}" data-pct="${p.pct}"></div></div>
      </div>
      <div class="p-score" style="color:${p.color}">${p.score}<span style="font-size:12px;color:var(--muted)">/20</span></div>`;
    cardsEl.appendChild(d);
  });
  setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.pct+'%'),200);

  // Profile
  const prof=getProfile(ranked);
  document.getElementById('profile-card').innerHTML=`
    <span class="profile-badge" style="background:${prof.color}22;color:${prof.color};border:1px solid ${prof.color}44">${prof.badge}</span>
    <div class="profile-title" style="color:${prof.color}">${prof.title}</div>
    <div class="profile-desc">${prof.desc}</div>`;

  // Strengths & Cautions
  const top1=ranked[0],top2=ranked[1],bot=ranked[ranked.length-1],bot2=ranked[ranked.length-2];
  document.getElementById('str-caut').innerHTML=`
    <div class="col-card">
      <div class="col-title" style="color:#a8e6cf">💪 핵심 강점</div>
      <ul>
        <li>${top1.icon} ${top1.name}(${top1.score}점)이 가장 강력한 영향력 원천</li>
        <li>${top2.icon} ${top2.name}(${top2.score}점)이 이를 효과적으로 뒷받침</li>
        <li>두 파워의 시너지로 복합적 리더십 발휘</li>
        <li>다양한 상황에서 파워를 전환하는 유연성 보유</li>
      </ul>
    </div>
    <div class="col-card">
      <div class="col-title" style="color:#e05c6a">⚠️ 주의 & 개발 포인트</div>
      <ul>
        <li>${bot.icon} ${bot.name}(${bot.score}점)은 집중 개발이 필요한 영역</li>
        <li>${bot2.icon} ${bot2.name}(${bot2.score}점)도 추가 강화가 권장됨</li>
        <li>최상위 파워에 과도한 의존 시 취약점 노출 가능</li>
        <li>상황적 리더십을 위한 파워 다양화가 필요</li>
      </ul>
    </div>`;

  // Accordion
  const detEl=document.getElementById('detail-section');
  detEl.innerHTML='';
  ranked.forEach((p,i)=>{
    const t=tier(p.score);
    const tLabel=t==='high'?'높음':t==='mid'?'보통':'낮음';
    const tBg=t==='high'?'rgba(168,230,207,.15)':t==='mid'?'rgba(255,217,61,.15)':'rgba(224,92,106,.15)';
    const tColor=t==='high'?'#a8e6cf':t==='mid'?'#ffd93d':'#e05c6a';
    const dc=document.createElement('div');
    dc.className='detail-card';
    dc.innerHTML=`
      <div class="detail-header" onclick="toggleDetail(this)">
        <div class="detail-left">
          <div class="detail-icon">${p.icon}</div>
          <div>
            <div class="detail-name" style="color:${p.color}">${p.name}</div>
            <div class="detail-name-en">${p.nameEn}</div>
          </div>
        </div>
        <div class="score-badge" style="background:${tBg};color:${tColor}">${p.score}점 · ${tLabel}</div>
        <span class="detail-arrow ${i===0?'open':''}">›</span>
      </div>
      <div class="detail-body ${i===0?'open':''}">
        <div class="interp-text">${p.interp[t]}</div>
        <div class="tips-box">
          <div class="tips-title">📌 실행 가능한 팁</div>
          <ul>${p.tips[t].map(tip=>`<li>${tip}</li>`).join('')}</ul>
        </div>
      </div>`;
    detEl.appendChild(dc);
  });

  // Dev plan
  const w=ranked[ranked.length-1], w2=ranked[ranked.length-2];
  document.getElementById('dev-card').innerHTML=`
    <div class="dev-title">🗺️ 나만의 파워 개발 로드맵</div>
    <div class="dev-desc">현재 ${ranked[0].icon}${ranked[0].name}과 ${ranked[1].icon}${ranked[1].name}을 주요 강점으로 활용하면서, ${w.icon}${w.name}과 ${w2.icon}${w2.name}을 단계적으로 개발하여 균형 잡힌 리더십을 구축하세요.</div>
    <div class="dev-steps">
      <div class="dev-step"><div class="dev-num">1</div><div class="dev-text"><strong style="color:${ranked[0].color}">${ranked[0].name} 극대화 (1개월)</strong><br>현재 가장 강한 파워를 더욱 전략적으로 활용하고, 그 효과를 조직 전체로 확장하는 방법을 찾으세요.</div></div>
      <div class="dev-step"><div class="dev-num">2</div><div class="dev-text"><strong style="color:${w2.color}">${w2.name} 집중 개발 (2~3개월)</strong><br>약점 중 상대적으로 접근이 쉬운 파워부터 시작하세요. 소규모 실험과 피드백을 통해 역량을 키워나갑니다.</div></div>
      <div class="dev-step"><div class="dev-num">3</div><div class="dev-text"><strong style="color:${w.color}">${w.name} 기초 구축 (3~6개월)</strong><br>가장 낮은 파워 영역을 체계적으로 개발합니다. 멘토링, 학습, 현장 실천을 병행하세요.</div></div>
      <div class="dev-step"><div class="dev-num">4</div><div class="dev-text"><strong style="color:var(--accent1)">통합 리더십 내재화 (6개월~)</strong><br>모든 파워를 상황에 맞게 유연하게 활용하는 상황적 리더십(Situational Leadership)을 목표로 삼으세요.</div></div>
    </div>`;

  setTimeout(()=>drawRadar(ranked),300);
}

function toggleDetail(header) {
  const body=header.nextElementSibling;
  const arrow=header.querySelector('.detail-arrow');
  const isOpen=body.classList.contains('open');
  document.querySelectorAll('.detail-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.detail-arrow').forEach(a=>a.classList.remove('open'));
  if(!isOpen){ body.classList.add('open'); arrow.classList.add('open'); }
}

function drawRadar(ranked) {
  const canvas=document.getElementById('radarChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)*.38,N=ranked.length,maxVal=20;
  ctx.clearRect(0,0,W,H);
  for(let lv=1;lv<=5;lv++){
    const r=(R*lv)/5; ctx.beginPath();
    for(let i=0;i<N;i++){ const a=(Math.PI*2*i)/N-Math.PI/2; i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a)); }
    ctx.closePath(); ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1; ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a=(Math.PI*2*i)/N-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1; ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a=(Math.PI*2*i)/N-Math.PI/2, r=R+30;
    ctx.font='14px sans-serif'; ctx.fillStyle=ranked[i].color;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ranked[i].icon,cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.beginPath();
  for(let i=0;i<N;i++){
    const a=(Math.PI*2*i)/N-Math.PI/2, r=R*(ranked[i].score/maxVal);
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  g.addColorStop(0,'rgba(123,104,238,.5)'); g.addColorStop(1,'rgba(200,155,95,.15)');
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(200,155,95,.8)'; ctx.lineWidth=2.5; ctx.stroke();
  for(let i=0;i<N;i++){
    const a=(Math.PI*2*i)/N-Math.PI/2, r=R*(ranked[i].score/maxVal);
    ctx.beginPath(); ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),5.5,0,Math.PI*2);
    ctx.fillStyle=ranked[i].color; ctx.fill();
    ctx.strokeStyle='#0a0a0f'; ctx.lineWidth=2; ctx.stroke();
  }
}

function savePDF() {
  document.querySelectorAll('.detail-body').forEach(b=>b.classList.add('open'));
  document.querySelectorAll('.detail-arrow').forEach(a=>a.classList.add('open'));
  setTimeout(()=>window.print(), 100);
}
</script>
